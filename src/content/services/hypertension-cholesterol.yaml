faq:
  - question: "What blood pressure reading is considered high?"
    answer: "Blood pressure above 140/90 mmHg is considered hypertensive. However, treatment targets may vary based on age and existing conditions. Ideal blood pressure is below 120/80 mmHg."
  - question: "Can high cholesterol be managed without medication?"
    answer: "Mild elevations may respond to diet and exercise alone. However, if your overall cardiovascular risk is high, medication (usually statins) is recommended alongside lifestyle changes."
  - question: "How often should I get my cholesterol checked?"
    answer: "Adults over 30 should get a lipid profile at least once a year. If you have risk factors or are on medication, testing every 3-6 months may be recommended."
  - question: "Are there symptoms of high cholesterol?"
    answer: "No — high cholesterol has no visible symptoms. The only way to know your levels is through a blood test. This is why regular screening is critical for prevention."
