faq:
  - question: "What is considered high blood pressure?"
    answer: "A blood pressure reading of 140/90 mmHg or higher is generally considered high. However, for some individuals, especially those with diabetes or heart conditions, lower targets may be recommended."
  - question: "Can high cholesterol be controlled without medication?"
    answer: "In mild cases, cholesterol can be managed with lifestyle changes such as a healthy diet, regular exercise, and weight control. However, many patients require medication to effectively reduce risk."
  - question: "How often should cholesterol levels be checked?"
    answer: "Adults should check their cholesterol at least once every year. Patients with existing heart risk factors may need more frequent testing as advised by their doctor."
  - question: "Does high cholesterol cause any symptoms?"
    answer: "High cholesterol usually has no visible symptoms. It often goes undetected until it leads to serious conditions like heart attack or stroke, which is why regular testing is essential."
  - question: "Can hypertension be cured permanently?"
    answer: "Hypertension cannot always be cured, but it can be effectively controlled with proper treatment, lifestyle changes, and regular monitoring."
  - question: "What foods help control blood pressure and cholesterol?"
    answer: "A heart-healthy diet includes fruits and vegetables, whole grains, nuts and seeds, low-fat dairy, and lean proteins like fish and chicken. Reducing salt, sugar, and saturated fats is equally important."
