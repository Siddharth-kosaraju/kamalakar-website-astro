sections:
  - paragraphs:
      - "High blood pressure (hypertension) and high cholesterol are two of the most common causes of heart disease in India. Often called \"silent killers,\" these conditions usually develop without noticeable symptoms, yet they significantly increase the risk of heart attack, stroke, and other cardiovascular complications."
      - "At Kamalakar Heart Centre, Guntur, Dr. Kamalakar Kosaraju offers comprehensive screening and personalized treatment plans to help patients effectively manage these conditions and protect long-term heart health."
  - heading: "Understanding the Risk"
    paragraphs:
      - "Hypertension puts extra strain on blood vessels and the heart, while high cholesterol leads to plaque buildup in arteries. Together, they reduce blood flow and increase the chances of serious cardiac events."
      - "Early detection and timely treatment are key to preventing complications."
  - heading: "Diagnosis & Evaluation"
    paragraphs:
      - "A complete assessment includes:"
    bullets:
      - "Blood pressure monitoring"
      - "Lipid profile (cholesterol levels)"
      - "Blood sugar testing"
      - "Family history and lifestyle evaluation"
      - "Cardiovascular risk scoring"
    closingText: "This detailed evaluation helps create a treatment plan tailored to each patient's condition."
  - heading: "Personalized Treatment Approach"
    paragraphs:
      - "Treatment focuses on both medical management and lifestyle changes, including:"
    bullets:
      - "Medications such as antihypertensives and statins"
      - "Heart-healthy diet (low salt, low saturated fat)"
      - "Regular physical activity"
      - "Weight management"
      - "Stress control and better sleep habits"
    closingText: "Dr. Kamalakar emphasizes that lasting results come from combining medication with consistent lifestyle improvements."
  - heading: "Ongoing Monitoring & Care"
    paragraphs:
      - "Regular follow-ups are essential to keep these conditions under control:"
    bullets:
      - "Initial monitoring every 4–8 weeks"
      - "Medication adjustments based on progress"
      - "Quarterly check-ups once levels stabilize"
    closingText: "With proper management, patients can reduce their risk of heart attack by up to 50%."
