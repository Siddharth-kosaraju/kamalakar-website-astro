heroHeading: "Emergency Cardiac Care"
heroSubheading: "24/7 immediate response for heart attacks and cardiac emergencies — because every minute counts."
content:
  - "A heart attack (myocardial infarction) occurs when blood flow to a part of the heart is suddenly blocked, usually by a blood clot in a coronary artery. Without immediate treatment, the affected heart muscle begins to die within minutes. Recognizing the warning signs — chest pain or pressure, pain radiating to the arm or jaw, shortness of breath, cold sweats, nausea — and getting to a hospital quickly is critical."
  - "Kamalakar Heart Centre at Life Hospital provides round-the-clock emergency cardiac care. Our facility is equipped with an advanced cath-lab capable of performing emergency angioplasty (primary PCI), which is the gold-standard treatment for heart attacks. The goal is 'door-to-balloon' time of under 90 minutes — the time from hospital arrival to opening the blocked artery."
  - "Dr. Kamalakar and the cardiac team are available 24/7 for emergency procedures. When you call our emergency number (99594 23566), the team is mobilized immediately. On arrival, rapid ECG assessment confirms the diagnosis, and if a heart attack is confirmed, the patient is taken directly to the cath-lab for emergency angioplasty."
  - "Beyond the acute emergency, Kamalakar Heart Centre provides comprehensive post-heart-attack care including cardiac rehabilitation guidance, medication management, lifestyle counseling, and regular follow-up. Surviving a heart attack is just the beginning — proper follow-up care dramatically reduces the risk of future events."
steps:
  - title: "Call Emergency (99594 23566)"
    description: "Call immediately if you experience chest pain, breathlessness, or other heart attack symptoms. Do not wait for symptoms to pass."
  - title: "Rapid ECG Assessment"
    description: "On arrival, an ECG is performed within minutes to confirm whether a heart attack is occurring and determine the type."
  - title: "Emergency Angioplasty (Primary PCI)"
    description: "If confirmed, you are taken directly to the cath-lab for emergency angioplasty to open the blocked artery and restore blood flow."
  - title: "ICU Monitoring"
    description: "Post-procedure monitoring in the cardiac ICU for 24-48 hours to ensure stable recovery."
  - title: "Discharge & Rehabilitation"
    description: "Cardiac rehabilitation plan, medication guidance, dietary advice, and scheduled follow-ups to prevent recurrence."
faq:
  - question: "What are the warning signs of a heart attack?"
    answer: "Chest pain or pressure, pain spreading to the left arm, jaw, or back, shortness of breath, cold sweats, nausea, and sudden dizziness. If you experience any of these, call 99594 23566 immediately."
  - question: "How quickly should I get to a hospital during a heart attack?"
    answer: "Every minute matters. Ideally, treatment should begin within 90 minutes of symptom onset. Do not drive yourself — call an ambulance or have someone drive you."
  - question: "Is your emergency service available on Sundays and holidays?"
    answer: "Yes. Our emergency cardiac care operates 24 hours a day, 7 days a week, 365 days a year including all holidays."
  - question: "What happens after a heart attack?"
    answer: "You'll receive medications to prevent future events, cardiac rehabilitation guidance, dietary advice, and regular follow-ups. Most patients can return to normal activity within 4-6 weeks."
