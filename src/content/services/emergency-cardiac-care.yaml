sections:
  - paragraphs:
      - "Emergency cardiac care is vital when every minute can make a difference between life and death. A heart attack, also known as myocardial infarction, occurs when blood flow to the heart muscle is suddenly blocked, most often due to a clot in a coronary artery. Without prompt treatment, permanent damage to the heart can occur within minutes."
      - "Common warning signs include chest pain or pressure, discomfort spreading to the arm, neck, or jaw, shortness of breath, sweating, nausea, and sudden fatigue. Recognizing these symptoms early and seeking immediate medical attention is critical."
      - "At Kamalakar Heart Centre in Guntur, patients receive round-the-clock emergency heart care supported by advanced infrastructure and an experienced cardiac team led by Dr. Kamalakar."
  - heading: "Immediate Care When You Need It Most"
    paragraphs:
      - "The centre is equipped with a state-of-the-art cath lab to perform emergency angioplasty (Primary PCI), the most effective treatment for restoring blood flow during a heart attack."
      - "A key focus is maintaining a door-to-balloon time of under 90 minutes, ensuring rapid intervention and improved patient outcomes."
      - "When you call the emergency number 99594 23566, the cardiac team is activated immediately. Upon arrival, a quick ECG is performed to confirm the diagnosis, and if required, the patient is taken directly for emergency angioplasty without delay."
  - heading: "Comprehensive Care Beyond the Emergency"
    paragraphs:
      - "Emergency treatment is only the first step. After stabilization, patients receive complete post-heart-attack care, including:"
    bullets:
      - "Medication management"
      - "Cardiac rehabilitation guidance"
      - "Lifestyle and diet counseling"
      - "Regular follow-up monitoring"
    closingText: "This holistic approach helps reduce the risk of future cardiac events and supports long-term heart health."
steps:
  - title: "Call Emergency Support (99594 23566)"
    description: "Seek immediate help if you experience chest pain, breathlessness, or other warning signs. Do not delay."
  - title: "Rapid ECG Evaluation"
    description: "An ECG is performed within minutes of arrival to diagnose the condition and determine the type of heart issue."
  - title: "Emergency Angioplasty (Primary PCI)"
    description: "If a heart attack is confirmed, immediate angioplasty is performed to open the blocked artery and restore blood flow."
  - title: "ICU Monitoring"
    description: "Patients are closely monitored in the cardiac ICU for 24–48 hours to ensure stability and recovery."
  - title: "Discharge and Rehabilitation"
    description: "A structured recovery plan including medications, lifestyle guidance, and follow-up care is provided."
faq:
  - question: "What are the warning signs of a heart attack?"
    answer: "Common symptoms include chest pain or pressure, pain radiating to the arm or jaw, shortness of breath, sweating, nausea, and dizziness. Symptoms can vary, so it's important not to ignore any unusual discomfort."
  - question: "How quickly should I reach a hospital during a heart attack?"
    answer: "You should seek medical help immediately. The first 60–90 minutes are critical, and early treatment significantly improves survival and recovery outcomes."
  - question: "Is emergency cardiac care available 24/7?"
    answer: "Yes, emergency cardiac services at Kamalakar Heart Centre in Guntur are available 24/7, including Sundays and holidays, ensuring immediate care whenever needed."
  - question: "What treatment is given during a heart attack?"
    answer: "The primary treatment is emergency angioplasty (Primary PCI) to open blocked arteries. Medications and supportive care are also provided based on the patient's condition."
  - question: "What happens after a heart attack?"
    answer: "After initial treatment, patients undergo monitoring, medication management, and cardiac rehabilitation. Lifestyle changes and regular follow-ups are essential to prevent future heart problems."
