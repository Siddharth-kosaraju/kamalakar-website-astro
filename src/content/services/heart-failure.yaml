faq:
  - question: "Can heart failure be cured?"
    answer: "Heart failure is a long-term condition, but it can be effectively managed with proper treatment."
  - question: "What causes heart failure?"
    answer: "Common causes include coronary artery disease, high blood pressure, and heart muscle damage."
  - question: "Can I exercise with heart failure?"
    answer: "Yes, light to moderate exercise is beneficial under medical supervision."
  - question: "How often are follow-ups needed?"
    answer: "Follow-ups depend on the severity of the condition and treatment plan."
  - question: "What should I eat for heart health?"
    answer: "A low-salt, balanced diet with fresh and natural foods is recommended."
