heroHeading: "Heart Failure Management"
heroSubheading: "Personalized, long-term care for patients with weakened heart muscles — helping you live better and stronger."
content:
  - "Heart failure is a chronic condition where the heart cannot pump blood effectively enough to meet the body's needs. It does not mean the heart has stopped — it means the heart is working harder than it should. Symptoms include fatigue, shortness of breath, swelling in the legs and ankles, and difficulty performing everyday activities."
  - "At Kamalakar Heart Centre, Dr. Kamalakar takes a comprehensive approach to heart failure management. This begins with accurate diagnosis using 2D Echocardiography to measure ejection fraction (the percentage of blood pumped out with each heartbeat) and identify the underlying cause — whether it's coronary artery disease, valve problems, hypertension, or cardiomyopathy."
  - "Treatment is tailored to each patient and may include a combination of medications (ACE inhibitors, beta-blockers, diuretics), dietary modifications (sodium restriction, fluid management), supervised exercise programs, and regular monitoring. For advanced cases, device therapy such as pacemakers or cardiac resynchronization therapy (CRT) may be recommended."
  - "Living with heart failure requires ongoing medical supervision, but with the right treatment plan, most patients can lead active, fulfilling lives. Dr. Kamalakar and his team at Life Hospital provide continuous care — from initial diagnosis through long-term management — ensuring every patient receives the attention and adjustments their condition requires."
steps:
  - title: "Comprehensive Diagnosis"
    description: "2D Echo, ECG, blood tests, and clinical assessment to determine heart failure type (systolic vs diastolic) and severity."
  - title: "Personalized Treatment Plan"
    description: "Medication regimen tailored to your condition, including heart-strengthening drugs, fluid management, and blood pressure control."
  - title: "Lifestyle & Diet Guidance"
    description: "Sodium restriction, fluid intake monitoring, safe exercise recommendations, and stress management techniques."
  - title: "Regular Monitoring"
    description: "Scheduled follow-ups with Echo and blood tests to track improvement and adjust treatment as needed."
faq:
  - question: "Can heart failure be cured?"
    answer: "While heart failure is typically a chronic condition, many patients see significant improvement in symptoms and heart function with proper treatment. Early intervention leads to the best outcomes."
  - question: "What causes heart failure?"
    answer: "Common causes include coronary artery disease, uncontrolled high blood pressure, valve disorders, diabetes, and previous heart attacks. Sometimes the cause is unknown (idiopathic cardiomyopathy)."
  - question: "How often will I need follow-up visits?"
    answer: "Initially every 2-4 weeks until your condition stabilizes, then typically every 1-3 months for ongoing monitoring and medication adjustment."
  - question: "Can I exercise with heart failure?"
    answer: "Yes, supervised moderate exercise is actually beneficial. Dr. Kamalakar will guide you on safe activity levels based on your heart function."
