heroHeading: "Angiogram & Angioplasty"
heroSubheading: "Minimally invasive procedures to diagnose and treat blocked arteries, performed by one of Guntur's most experienced interventional cardiologists."
content:
  - "An angiogram (coronary angiography) is a diagnostic procedure that uses contrast dye and X-ray imaging to visualize the coronary arteries. A thin, flexible catheter is inserted through the wrist or groin and guided to the heart. This allows Dr. Kamalakar to identify blockages, narrowing, or abnormalities in the arteries supplying blood to your heart muscle."
  - "If significant blockages are found during the angiogram, angioplasty (Percutaneous Coronary Intervention) can often be performed in the same session. A tiny balloon is inflated inside the narrowed artery to widen it, and a stent — a small metal mesh tube — is usually placed to keep the artery open long-term. The entire procedure is performed under local anesthesia with mild sedation, so you remain awake and comfortable throughout."
  - "At Kamalakar Heart Centre, Dr. Kamalakar has performed over 5,000 cardiac procedures with a 99%+ success rate for angioplasty. The centre's advanced cath-lab at Life Hospital is equipped with high-resolution imaging and modern stent technology. Most patients experience no significant pain during the procedure and can return to normal activities within 24 to 48 hours."
  - "Angioplasty is typically recommended for patients experiencing chest pain (angina), those who have had a heart attack, or patients whose stress tests indicate reduced blood flow to the heart. Early diagnosis through angiography and timely intervention through angioplasty can prevent heart attacks and significantly improve quality of life."
steps:
  - title: "Consultation & Assessment"
    description: "Dr. Kamalakar evaluates your symptoms, medical history, and test results (ECG, 2D Echo) to determine if an angiogram is needed."
  - title: "Pre-Procedure Preparation"
    description: "Basic blood tests and fasting for 6-8 hours. You'll be briefed on what to expect and given mild sedation."
  - title: "Angiogram (Diagnostic)"
    description: "A catheter is inserted through the wrist or groin. Contrast dye is injected to visualize your coronary arteries on X-ray in real-time."
  - title: "Angioplasty (If Required)"
    description: "If blockages are found, a balloon catheter widens the artery and a stent is placed to keep it open. This is done in the same session."
  - title: "Recovery & Discharge"
    description: "Most patients rest for 4-6 hours post-procedure and are discharged the same day or next morning. Follow-up in 1-2 weeks."
faq:
  - question: "How long does an angiogram and angioplasty take?"
    answer: "An angiogram alone takes 30-60 minutes. If angioplasty is performed in the same session, the total time is typically 1-2 hours. You'll be awake throughout."
  - question: "Is angioplasty painful?"
    answer: "No. Local anesthesia numbs the catheter insertion site, and mild sedation keeps you relaxed. You may feel slight pressure but no pain."
  - question: "How soon can I go back to work after angioplasty?"
    answer: "Most patients return to desk work within 3-5 days and resume full physical activity within 2 weeks, depending on the complexity of the procedure."
  - question: "What is the success rate of angioplasty at your centre?"
    answer: "Dr. Kamalakar maintains a 99%+ success rate for angioplasty, backed by over 5,000 procedures performed using modern stent technology."
  - question: "Will I need to take medication after angioplasty?"
    answer: "Yes. Blood thinners and cholesterol-lowering medications are typically prescribed for a period after stent placement to ensure the artery stays open."
