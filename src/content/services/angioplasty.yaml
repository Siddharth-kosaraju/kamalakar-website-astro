faq:
  - question: "What is an angiogram?"
    answer: "An angiogram is a test that uses contrast dye and X-rays to detect blockages in heart arteries."
  - question: "Who is the best angiogram specialist in Guntur?"
    answer: "Dr. Kamalakar Kosaraju at Kamalakar Heart Center is one of the most trusted angiogram specialists in Guntur."
  - question: "How long does an angiogram take?"
    answer: "It usually takes about 30 to 45 minutes."
  - question: "Can angioplasty be done immediately after angiogram?"
    answer: "Yes, angioplasty can be performed in the same session if blockage is found."
  - question: "Will I need medication after angioplasty?"
    answer: "Yes, medications are prescribed to support recovery and prevent complications."
