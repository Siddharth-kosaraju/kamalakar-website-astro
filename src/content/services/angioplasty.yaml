sections:
  - paragraphs:
      - "Angiogram and angioplasty are essential heart procedures used to diagnose and treat blocked arteries. These minimally invasive treatments play a critical role in preventing heart attacks and improving blood flow to the heart."
      - "At Kamalakar Heart Center in Guntur, these advanced cardiac procedures are performed by Dr. Kamalakar Kosaraju, one of the best angiogram specialists in Guntur, using modern cath-lab technology and patient-focused care."
  - heading: "What is an Angiogram?"
    paragraphs:
      - "An angiogram (coronary angiography) is a diagnostic procedure used to identify blockages or narrowing in the coronary arteries."
      - "During the procedure:"
    bullets:
      - "A thin catheter is inserted through the wrist or groin"
      - "Contrast dye is injected into the arteries"
      - "X-ray imaging shows real-time blood flow and detects blockages"
    closingText: "At Kamalakar Heart Center, Guntur, angiograms help in early and accurate diagnosis of heart disease."
  - heading: "What is Angioplasty?"
    paragraphs:
      - "If a blockage is detected, angioplasty (Percutaneous Coronary Intervention) is performed to restore normal blood flow."
    bullets:
      - "A balloon is inflated to open the blocked artery"
      - "A stent is placed to keep the artery open"
      - "The procedure is minimally invasive and performed under local anesthesia"
    closingText: "This ensures effective treatment with faster recovery."
