  - heading: "Who Needs Angiogram or Angioplasty?"
    paragraphs:
      - "You may require these procedures if you experience:"
    bullets:
      - "Chest pain or discomfort (angina)"
      - "Shortness of breath"
      - "Abnormal ECG or stress test results"
      - "Previous heart attack"
      - "Risk factors such as diabetes, BP, or high cholesterol"
    closingText: "Early diagnosis at our heart center can prevent major complications."
