heroHeading: "ECG, 2D Echo & TMT Testing"
heroSubheading: "Accurate cardiac diagnostics at affordable prices — because the right diagnosis is the foundation of effective treatment."
content:
  - "Cardiac diagnostic tests are the first step in understanding your heart's health. At Kamalakar Heart Centre, we offer three essential non-invasive cardiac tests: Electrocardiogram (ECG), 2D Echocardiography (2D Echo), and Treadmill Test (TMT). These tests help Dr. Kamalakar detect heart rhythm disorders, structural abnormalities, valve problems, and hidden cardiac issues that may not cause symptoms at rest."
  - "An ECG records the electrical activity of your heart through sensors placed on your chest. It takes just 5-10 minutes and can detect irregular heartbeats, signs of a previous heart attack, and other rhythm disorders. At Kamalakar Heart Centre, a basic ECG is included in the ₹500 initial consultation fee, making it one of the most affordable cardiac screening options in Guntur."
  - "A 2D Echocardiogram uses ultrasound technology to create real-time images of your heart's chambers, valves, and blood flow. It measures ejection fraction (how well your heart pumps), detects valve problems, and identifies structural abnormalities. The test is painless, takes 15-30 minutes, and requires no special preparation."
  - "The Treadmill Test (TMT) is a stress test where you walk on a treadmill while your heart activity is monitored via ECG. It reveals cardiac issues that only appear under physical exertion — such as reduced blood flow that doesn't show up at rest. TMT is commonly recommended for patients with chest pain, shortness of breath during activity, or risk factors like diabetes, high cholesterol, or a family history of heart disease."
steps:
  - title: "Consultation & Test Selection"
    description: "Dr. Kamalakar evaluates your symptoms and risk factors to determine which tests are appropriate for you."
  - title: "ECG (5-10 minutes)"
    description: "Sensors placed on your chest record your heart's electrical activity. Non-invasive, painless, and immediate results."
  - title: "2D Echo (15-30 minutes)"
    description: "An ultrasound probe creates live images of your heart structure, valves, and pumping function. No preparation needed."
  - title: "TMT / Stress Test (20-30 minutes)"
    description: "Walking on a treadmill with increasing speed and incline while ECG monitors your heart's response to exercise."
  - title: "Results & Treatment Plan"
    description: "Dr. Kamalakar reviews all test results with you, explains findings, and recommends a treatment plan if needed."
faq:
  - question: "How much does an ECG test cost at Kamalakar Heart Centre?"
    answer: "A basic ECG is included in the ₹500 initial consultation fee. Detailed cardiac checkup packages including 2D Echo and TMT are available at transparent pricing — call 99594 23566 for details."
  - question: "Do I need to prepare for a 2D Echo?"
    answer: "No special preparation is needed. You can eat and drink normally before the test. Wear comfortable clothing that allows easy access to the chest area."
  - question: "Who should get a TMT test?"
    answer: "TMT is recommended for patients with chest pain or breathlessness during activity, those with heart disease risk factors (diabetes, high cholesterol, family history), and as part of routine cardiac screening for adults over 40."
  - question: "Are these tests safe?"
    answer: "Yes. ECG and 2D Echo are completely non-invasive with no risks. TMT involves mild physical exertion but is conducted under medical supervision with continuous monitoring."
