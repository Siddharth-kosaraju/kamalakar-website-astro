sections:
  - paragraphs:
      - "Understanding your heart health begins with the right diagnostic tests. At Kamalakar Heart Centre in Guntur, we provide essential non-invasive cardiac investigations including ECG, 2D Echocardiography, and Treadmill Test (TMT) to detect heart problems early and guide effective treatment."
      - "These tests help identify heart rhythm abnormalities, structural heart conditions, valve disorders, and reduced blood flow, even before symptoms become severe."
  - heading: "Comprehensive Cardiac Testing Under One Roof"
    paragraphs:
      - "At Kamalakar Heart Centre in Guntur, these diagnostic services are performed using modern equipment and expert evaluation by Dr. Kamalakar, ensuring accurate results and timely care."
  - heading: "Electrocardiogram (ECG)"
    paragraphs:
      - "An ECG is a quick and simple test that records the electrical activity of your heart using small sensors placed on the chest."
    bullets:
      - "Duration: 5–10 minutes"
      - "Detects: Irregular heartbeat, heart rhythm disorders, signs of previous heart attack"
      - "Non-invasive and painless"
      - "Immediate results available"
    closingText: "ECG is often the first step in evaluating symptoms such as chest pain, palpitations, or dizziness."
  - heading: "2D Echocardiography (2D Echo)"
    paragraphs:
      - "A 2D Echo is an ultrasound-based test that provides real-time images of the heart's structure and function."
    bullets:
      - "Duration: 15–30 minutes"
      - "Evaluates: Heart chambers, valves, blood flow, and pumping efficiency (ejection fraction)"
      - "Helps detect: Valve diseases, congenital defects, cardiomyopathy"
      - "Safe, painless, and no special preparation required"
    closingText: "This test gives a detailed view of how well your heart is functioning."
  - heading: "Treadmill Test (TMT) / Stress Test"
    paragraphs:
      - "The TMT evaluates how your heart performs under physical activity."
    bullets:
      - "Duration: 20–30 minutes"
      - "Procedure: Walking on a treadmill with gradually increasing speed while ECG monitors heart activity"
      - "Detects: Reduced blood supply to the heart (ischemia) that may not appear at rest"
      - "Recommended for: Chest pain during activity, shortness of breath, diabetes, high cholesterol, or family history of heart disease"
    closingText: "It is an important test for diagnosing coronary artery disease and assessing exercise tolerance."
  - heading: "Affordable and Reliable Cardiac Screening"
    paragraphs:
      - "At Kamalakar Heart Centre, cardiac diagnostics are designed to be both accessible and affordable, helping patients in Guntur receive early diagnosis without financial burden. A basic ECG is included as part of the initial consultation, making it easier for patients to begin their heart health evaluation."
