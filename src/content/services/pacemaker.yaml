heroHeading: "Pacemaker Implantation"
heroSubheading: "A small device that makes a big difference — restoring normal heart rhythm for patients with slow or irregular heartbeats."
content:
  - "A pacemaker is a small, battery-powered device implanted under the skin near the collarbone. It sends electrical impulses to the heart to maintain a regular rhythm. Pacemakers are recommended for patients with bradycardia (abnormally slow heart rate), heart blocks, or certain arrhythmias that cause dizziness, fainting, or fatigue."
  - "The implantation procedure is performed under local anesthesia and typically takes 1-2 hours. Dr. Kamalakar makes a small incision near the collarbone, guides thin wires (leads) through a vein into the heart, and connects them to the pacemaker device placed in a pocket under the skin. The device is programmed to your specific heart rhythm needs."
  - "Recovery is straightforward. Most patients stay overnight for observation and return home the next day. You'll need to avoid heavy lifting and strenuous arm movements on the implant side for about 6 weeks while the leads settle into position. After that, most patients return to their normal activities with no restrictions."
  - "Modern pacemakers are remarkably small and reliable, lasting 8-15 years on a single battery. Kamalakar Heart Centre provides ongoing device monitoring, including regular check-ups to ensure the pacemaker is functioning optimally and battery life is tracked. Patients report a significant improvement in energy levels, reduced dizziness, and better overall quality of life after implantation."
steps:
  - title: "Diagnosis & Evaluation"
    description: "ECG, Holter monitoring (24-hour ECG), and clinical assessment to confirm the need for a pacemaker."
  - title: "Pre-Operative Preparation"
    description: "Blood tests, medication review, and detailed briefing on the procedure. Local anesthesia is used."
  - title: "Pacemaker Implantation"
    description: "A small incision near the collarbone, leads guided to the heart, and device placed in a pocket under the skin. Takes 1-2 hours."
  - title: "Programming & Testing"
    description: "The pacemaker is programmed to your heart's specific needs and tested to ensure proper function."
  - title: "Recovery & Follow-Up"
    description: "Overnight stay, discharge next day. Follow-up at 1 week, 1 month, then every 6 months for device checks."
faq:
  - question: "How long does a pacemaker last?"
    answer: "Modern pacemakers last 8-15 years depending on usage. When the battery runs low, a simple replacement procedure swaps the device while keeping the existing leads."
  - question: "Can I use a mobile phone with a pacemaker?"
    answer: "Yes. Modern pacemakers are well-shielded. Just avoid holding the phone directly over the pacemaker site. Everyday electronics like microwaves and computers are safe."
  - question: "Will I feel the pacemaker under my skin?"
    answer: "You may be aware of the device initially, but most patients stop noticing it within a few weeks. The device is small and sits comfortably under the skin."
  - question: "Can I travel and exercise with a pacemaker?"
    answer: "Absolutely. After the initial recovery period, you can travel, exercise, and live normally. Inform airport security about your device, as it may trigger metal detectors."
