faq:
  - question: "Is EECP available in Guntur?"
    answer: "Yes. EECP therapy is offered at Kamalakar Heart Centre in Guntur, supervised by Dr Kamalakar Kosaraju, Interventional Cardiologist. It is delivered as a day-care, non-invasive treatment with no admission required."
  - question: "How many EECP sessions are needed?"
    answer: "A standard course is 35 sessions of one hour each, typically scheduled as one session per day, five days a week, for about seven weeks."
  - question: "Is EECP painful or risky?"
    answer: "EECP is non-invasive and generally well tolerated. Most patients describe a firm rhythmic squeeze on the legs. Mild leg redness or muscle soreness can occur and usually settles quickly. Serious complications are uncommon."
  - question: "Will EECP replace angioplasty or bypass surgery?"
    answer: "No. EECP is considered when angioplasty or bypass is not feasible, has already been done, or has not relieved chronic angina. The right choice depends on your specific cardiac anatomy and symptoms — it is decided clinically, not by patient preference alone."
  - question: "Who should NOT have EECP?"
    answer: "EECP is generally avoided in severe valvular disease, uncontrolled high blood pressure, recent deep-vein thrombosis, severe peripheral arterial disease, certain bleeding disorders, and pregnancy. Suitability is decided after a cardiology consultation."
  - question: "How much does EECP cost in Guntur?"
    answer: "Initial cardiology consultation is ₹500 and includes a basic ECG. EECP package pricing depends on the session count and any add-on tests; call Kamalakar Heart Centre at 9959423566 for current rates."
