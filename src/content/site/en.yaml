services:
  heading: "Comprehensive Heart Care Services"
  expertiseChip: "Our Expertise"
  description: "Advanced cardiac diagnosis, treatment, and preventive heart care delivered with modern medical technology and a patient-focused approach."
  learnMore: "Learn more"
  viewAllBtn: "View All Services"
  items:
    - title: "Angiogram and Angioplasty"
      desc: "Angiogram helps detect blockages in coronary arteries while angioplasty restores proper blood flow using minimally invasive techniques. These procedures help reduce the risk of heart attacks and improve recovery for patients with coronary artery disease."
    - title: "Heart Failure Management"
      desc: "Heart failure occurs when the heart cannot pump blood effectively. Treatment focuses on medication lifestyle guidance and regular monitoring to improve heart function and overall quality of life."
    - title: "Hypertension and Cholesterol Control"
      desc: "High blood pressure and high cholesterol are major risk factors for cardiovascular disease. Regular monitoring treatment and preventive care help reduce long term heart complications."
    - title: "Pacemaker Implantation"
      desc: "Pacemaker implantation helps regulate abnormal heart rhythms and supports proper heart function. This procedure is recommended for patients with severe arrhythmias or slow heart rate."
    - title: "Emergency Cardiac Care and Heart Attack Treatment"
      desc: "Emergency cardiac care is critical during chest pain heart attack or sudden cardiac symptoms. Immediate medical attention improves survival rates and recovery outcomes."
    - title: "ECG Test and 2D Echo"
      desc: "ECG and 2D echocardiography help evaluate heart rhythm heart structure and cardiac function. These diagnostic tests support early detection of heart disease and guide effective treatment."

