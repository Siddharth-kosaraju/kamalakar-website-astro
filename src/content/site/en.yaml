about:
  heading: "Excellence in Cardiac Care in Guntur"
  p1: "Dr. Kamalakar Kosaraju is one of the most credentialed Interventional Cardiologists in Guntur, Andhra Pradesh. A Gold Medalist in M.D. (General Medicine) and D.M. in Cardiology from Osmania Medical College, he brings over a decade of hands-on experience treating complex cardiac conditions — from emergency heart attacks to routine preventive checkups."
  p2: "At Life Hospital in Kothapet, Dr. Kamalakar combines world-class training with a patient-first approach, offering affordable cardiac care without compromising on quality. His fellowship from the European Society of Cardiology (FESC) reflects a commitment to international treatment standards, giving every patient access to evidence-based, compassionate heart care."
  experienceBadge: "10+ Years Experience"
  servicesLinkText: "Explore our comprehensive heart care services in Guntur"
  learnMoreBtn: "Learn More About Dr. Kamalakar"
  sectionChip: "About The Doctor"
  subtitle: "Cardiac Specialist"
  roleTitle: "Interventional Cardiologist"
  credentialMD: "M.D. Gold Medalist"
  credentialDM: "D.M. Cardiology"

services:
  heading: "Comprehensive Heart Care Services in Guntur"
  expertiseChip: "Our Expertise"
  description: "World-class cardiac care delivered with precision and compassion using state-of-the-art technology."
  learnMore: "Learn more"
  viewAllBtn: "View All Services"
  items:
    - title: "Angiogram & Angioplasty in Guntur"
      desc: "Minimally invasive procedures to diagnose and open blocked coronary arteries. Dr. Kamalakar has performed 5,000+ procedures with a 99%+ success rate, helping patients return to normal life within 24-48 hours."
    - title: "Heart Failure Management in Guntur"
      desc: "Comprehensive care for weak heart muscles, fluid buildup, and reduced ejection fraction. Includes personalized medication plans, lifestyle guidance, and ongoing monitoring to improve quality of life."
    - title: "Hypertension & Cholesterol Control in Guntur"
      desc: "Personalized treatment plans for high blood pressure and elevated cholesterol — two silent risk factors that cause heart attacks if left unchecked. Regular monitoring and early intervention prevent long-term damage."
    - title: "Pacemaker Implantation in Guntur"
      desc: "Advanced pacemaker surgery for patients with irregular heartbeats or arrhythmias. The procedure takes under two hours, and most patients resume normal activities within 2-4 weeks of implantation."
    - title: "Emergency Cardiac Care & Heart Attack Treatment"
      desc: "Round-the-clock emergency care for chest pain, heart attacks, and cardiac crises. Our cath-lab is equipped for immediate angioplasty, giving patients the best chance of a full recovery."
    - title: "ECG Test & 2D Echo in Guntur"
      desc: "Complete cardiac diagnostics including ECG, 2D Echocardiography, and Treadmill (TMT) stress testing. ECG is included in the ₹500 consultation fee — accurate diagnosis is the first step to effective treatment."

