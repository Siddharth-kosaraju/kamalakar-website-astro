faq:
  heading: "Frequently Asked Questions"
  commonQuestions: "Common Questions"
  subtitle: "Get clarity on our procedures, insurance, and patient care protocols."
  stillHaveQuestions: "Still have questions?"
  contactSupport: "Contact Our Support Team"
  items:
    - question: "Who is Dr. Kamalakar Kosaraju?"
      answer: "Dr. Kamalakar Kosaraju is an Interventional Cardiologist practicing at Kamalakar Heart Centre in Guntur, Andhra Pradesh. He holds a Gold Medal in M.D. (General Medicine) and a D.M. in Cardiology from Osmania Medical College. He is a Fellow of the European Society of Cardiology (FESC) with 10+ years of experience and 5,000+ cardiac procedures."
    - question: "Where is Kamalakar Heart Centre located?"
      answer: "Kamalakar Heart Centre is located inside Life Hospital, Old Club Road, Kothapet, Guntur, Andhra Pradesh - 522001. It is opposite AVR Hospital. For directions, search 'Kamalakar Heart Centre Life Hospital Kothapet Guntur' on Google Maps."
    - question: "What are Dr. Kamalakar's qualifications?"
      answer: "Dr. Kamalakar holds a Gold Medal in M.D. (General Medicine), a D.M. in Cardiology from Osmania Medical College (OSM), and is a Fellow of the European Society of Cardiology (FESC). These qualifications place him among the most credentialed cardiologists in Guntur and Andhra Pradesh."
    - question: "What procedures does Kamalakar Heart Centre offer?"
      answer: "Kamalakar Heart Centre offers Angiogram, Angioplasty, Pacemaker Implantation, Heart Failure Management, Hypertension and Cholesterol Treatment, Emergency Cardiac Care, ECG Test, 2D Echo, and TMT Test. All procedures are performed by Dr. Kamalakar at the Kothapet, Guntur facility."
    - question: "What are the consultation hours and fees at Kamalakar Heart Centre?"
      answer: "OPD hours are Monday to Saturday, 10:00 AM to 6:00 PM. Initial consultation costs Rs 500 and includes a detailed assessment with ECG. Emergency cardiac care is available 24/7. Call 99594 23566 to book an appointment."
    - question: "What should I bring for my consultation?"
      answer: "Please bring your medical reports, previous ECG/Echo/Angiography reports if available, current medication list, and a valid ID proof. Having your health records ready helps us provide better care."
    - question: "How long does an angiogram procedure take?"
      answer: "An angiogram takes 30-60 minutes at Kamalakar Heart Centre in Guntur. A thin catheter is inserted through the wrist or groin to visualize heart arteries using contrast dye. Dr. Kamalakar performs this minimally invasive diagnostic procedure with modern equipment."
    - question: "Is angioplasty painful?"
      answer: "No, angioplasty is not painful. You'll be given local anesthesia and mild sedation. You may feel some pressure during the procedure, but not pain. Most patients recover within 24 hours."
    - question: "What is the recovery time after pacemaker implantation?"
      answer: "Most patients resume normal activities within 2-4 weeks after pacemaker implantation. Heavy lifting and strenuous exercise should be avoided for about 6 weeks. Regular follow-up visits at Kamalakar Heart Centre ensure proper device functioning."
    - question: "Does your center accept insurance?"
      answer: "Yes, we accept most major health insurance plans including Arogya Raksha, United Healthcare, Star Health, and others. Please confirm with our reception desk for your specific policy coverage."
    - question: "Can I consult Dr. Kamalakar via video call?"
      answer: "Yes, we offer telemedicine consultations for follow-ups and initial consultations. Please call us at 99594 23566 to schedule a video appointment."
    - question: "What is the cost of an initial consultation?"
      answer: "Initial consultation is ₹500. This includes a detailed assessment, ECG, and treatment plan if needed. Procedural costs vary based on complexity and will be explained before treatment."
    - question: "Do you offer emergency services?"
      answer: "Yes, we provide 24/7 emergency cardiac care. Call 99594 23566 immediately if you experience chest pain, difficulty breathing, or other cardiac emergencies."
    - question: "What is your success rate for angioplasty?"
      answer: "Dr. Kamalakar has a 99%+ success rate for angioplasty, well above national averages. This reflects over 5,000 cardiac procedures performed with modern cath-lab equipment at Kamalakar Heart Centre, Guntur."
    - question: "Can I get a second opinion?"
      answer: "Absolutely! We welcome second opinion consultations. Please bring all your medical reports and imaging studies. We'll provide an honest, professional assessment."
    - question: "What is the cost of ECG test in Guntur?"
      answer: "Basic ECG is included in the ₹500 consultation fee at Kamalakar Heart Centre, Kothapet, Guntur. Detailed cardiac checkups (ECG, 2D Echo, TMT) are priced transparently on request. Contact 99594 23566 for specific test pricing."
    - question: "How is Angiogram performed in Guntur?"
      answer: "Angiogram is a minimally invasive test where a thin catheter is inserted through the wrist or groin to visualize heart arteries on X-ray using contrast dye. The procedure takes 30-60 minutes at Kamalakar Heart Centre, Kothapet, Guntur. Dr. Kamalakar performs angiograms with modern cath-lab equipment and high success rates."
    - question: "What are the symptoms of high cholesterol?"
      answer: "High cholesterol usually has no visible symptoms, making regular screening essential. Left untreated, it can cause chest pain, shortness of breath, fatigue, and increase the risk of heart attack. Dr. Kamalakar at Kamalakar Heart Centre, Guntur provides cholesterol testing and management to prevent heart disease."
    - question: "Where to get heart attack treatment in Guntur?"
      answer: "Kamalakar Heart Centre at Kothapet, Guntur provides 24/7 emergency cardiac care including heart attack treatment. Call 99594 23566 for immediate response. The facility has an advanced cath-lab for emergency angioplasty, staffed by Dr. Kamalakar, an experienced interventional cardiologist."

