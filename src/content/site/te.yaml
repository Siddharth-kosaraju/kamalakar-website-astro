about:
  heading: "అత్యుత్తమ గుండె వైద్యం"
  p1: "డాక్టర్ కమలాకర్ కోసరాజు గుంటూరులో ప్రముఖ ఇంటర్వెన్షనల్ కార్డియాలజిస్ట్. సంక్లిష్టమైన గుండె జబ్బులను నైపుణ్యంతో మరియు శ్రద్ధతో నయం చేయడంలో వీరు సిద్ధహస్తులు. ఎం.డి. (జనరల్ మెడిసిన్)లో గోల్డ్ మెడల్ మరియు OSM నుండి కార్డియాలజీలో D.M. సాధించారు."
  p2: "ప్రస్తుతం లైఫ్ హాస్పిటల్స్ (కొత్తపేట)లో సేవలందిస్తున్న డాక్టర్ కమలాకర్, అందుబాటు ధరలో ప్రపంచ స్థాయి గుండె వైద్యాన్ని అందించడానికి కట్టుబడి ఉన్నారు. యూరోపియన్ సొసైటీ ఆఫ్ కార్డియాలజీ (FESC) ఫెలోగా గుర్తింపు పొందడం అంతర్జాతీయ ప్రమాణాలకు నిదర్శనం."
  experienceBadge: "10+ సంవత్సరాల అనుభవం"
  servicesLinkText: "గుంటూరులో మా సమగ్ర హృదయ సంరక్షణ సేవలను అన్వేషించండి"
