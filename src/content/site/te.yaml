faq:
  heading: "తరచుగా అడిగే ప్రశ్నలు"
  commonQuestions: "సాధారణ ప్రశ్నలు"
  subtitle: "మా విధానాలు, విమా మరియు రోగి సంరక్షణ ప్రోటోకాల్‌ల గురించి స్పష్టత పొందండి."
  stillHaveQuestions: "ఇంకా ప్రశ్నలు ఉన్నాయా?"
  contactSupport: "మా మద్దతు బృందాన్ని సంప్రదించండి"
  items:
    - question: "డాక్టర్ కమలాకర్ కోసరాజు ఎవరు?"
      answer: "డాక్టర్ కమలాకర్ కోసరాజు గుంటూరు, ఆంధ్రప్రదేశ్‌లోని కమలాకర్ హార్ట్ సెంటర్‌లో ప్రాక్టీస్ చేస్తున్న ఇంటర్వెన్షనల్ కార్డియాలజిస్ట్. ఆయన M.D. (జనరల్ మెడిసిన్)లో గోల్డ్ మెడల్, ఉస్మానియా మెడికల్ కాలేజ్ నుండి D.M. కార్డియాలజీ మరియు ఫెలో ఆఫ్ యూరోపియన్ సొసైటీ ఆఫ్ కార్డియాలజీ (FESC) హోదా కలిగి ఉన్నారు. 10+ సంవత్సరాల అనుభవం మరియు 5,000+ కార్డియాక్ విధానాలు చేశారు."
    - question: "కమలాకర్ హార్ట్ సెంటర్ ఎక్కడ ఉంది?"
      answer: "కమలాకర్ హార్ట్ సెంటర్ లైఫ్ హాస్పిటల్, ఓల్డ్ క్లబ్ రోడ్, కోఠాపేట, గుంటూరు, ఆంధ్రప్రదేశ్ - 522001లో ఉంది. AVR హాస్పిటల్ ఎదురుగా. దిశల కోసం గూగుల్ మ్యాప్స్‌లో 'కమలాకర్ హార్ట్ సెంటర్ లైఫ్ హాస్పిటల్ కోఠాపేట గుంటూరు' అని వెతకండి."
    - question: "డాక్టర్ కమలాకర్ అర్హతలు ఏమిటి?"
      answer: "డాక్టర్ కమలాకర్ M.D. (జనరల్ మెడిసిన్)లో గోల్డ్ మెడల్, ఉస్మానియా మెడికల్ కాలేజ్ (OSM) నుండి D.M. కార్డియాలజీ మరియు ఫెలో ఆఫ్ యూరోపియన్ సొసైటీ ఆఫ్ కార్డియాలజీ (FESC) హోదా కలిగి ఉన్నారు. ఈ అర్హతలు ఆయనను గుంటూరు మరియు ఆంధ్రప్రదేశ్‌లో అత్యంత అర్హత కలిగిన కార్డియాలజిస్ట్‌లలో ఒకరిగా చేస్తాయి."
    - question: "కమలాకర్ హార్ట్ సెంటర్ ఏ విధానాలను అందిస్తుంది?"
      answer: "కమలాకర్ హార్ట్ సెంటర్ యాంజియోగ్రామ్, యాంజియోప్లాస్టీ, పేస్‌మేకర్ ఇమ్‌ప్లాంటేషన్, హార్ట్ ఫెయిల్యూర్ మేనేజ్‌మెంట్, హైపర్‌టెన్షన్ మరియు కొలెస్ట్రాల్ చికిత్స, ఎమర్జెన్సీ కార్డియాక్ కేర్, ECG టెస్ట్, 2D Echo మరియు TMT టెస్ట్ అందిస్తుంది. అన్ని విధానాలు డాక్టర్ కమలాకర్ కోఠాపేట, గుంటూరు సౌకర్యంలో చేస్తారు."
    - question: "కమలాకర్ హార్ట్ సెంటర్‌లో సందర్శన సమయాలు మరియు ఫీజులు ఏమిటి?"
      answer: "OPD సమయాలు సోమవారం నుండి శనివారం, ఉదయం 10:00 నుండి సాయంత్రం 6:00 వరకు. ప్రారంభ సందర్శన ₹500, ఇందులో ECGతో వివరణాత్మక మూల్యాంకనం ఉంటుంది. ఎమర్జెన్సీ కార్డియాక్ కేర్ 24/7 అందుబాటులో ఉంది. అపాయింట్‌మెంట్ బుక్ చేయడానికి 99594 23566కు కాల్ చేయండి."
    - question: "సందర్శన కోసం నేను ఏమి తీసుకువెళ్లాలి?"
      answer: "దయచేసి మీ వైద్య నివేదికలు, గతం ECG/Echo/Angiography నివేదికలను, ప్రస్తుత ఔషధాల జాబితాను మరియు చెల్లుబాటు గల ID రుజువు తీసుకువెళ్లండి."
    - question: "యాంజియోగ్రామ్ విధానం ఎంత సమయం పడుతుంది?"
      answer: "యాంజియోగ్రామ్ సాధారణంగా 30-60 నిమిషాలు పడుతుంది. ఇది కనీస ఆక్రమణాత్మక విధానం, ఇక్కడ ధమనులను చూడటానికి కేథెటర్ చేర్చబడుతుంది."
    - question: "యాంజియోప్లాస్టీ బాధాకరమైనదా?"
      answer: "లేదు, యాంజియోప్లాస్టీ బాధాకరం కాదు. మీకు స్థానిక మత్తులోთ మరియు తేలికపాటి సంచేతన చేయబడుతుంది. చాలా రోగులు 24 గంటల్లో కోలుకుంటారు."
    - question: "పేస్‌మేకర్ ఇమ్‌ప్లాంటేషన్ తర్వాత పునరుద్ధరణ సమయం ఎంత?"
      answer: "చాలా రోగులు 2-4 వారాల్లో సాధారణ కార్యకలాపాలకు తిరిగి వస్తారు. 6 వారాల పాటు భారీ లిఫ్టింగ్ మరియు కఠోర వ్యాయామం నుండి దూరంగా ఉండండి."
    - question: "మీ కేంద్రం విమా ఆమోదం చేస్తుందా?"
      answer: "అవును, మేము చాలా ప్రధాన ఆరోగ్య విమా ప్రణాళికలను ఆమోదం చేస్తాము. మీ నిర్దిష్ట విధానం కవరేజ్‌కు మా రిసెప్షన్ డెస్క్‌కు సంప్రదించండి."
    - question: "నేను డాక్టర్ కమలాకర్‌ను వీడియో కాల్ ద్వారా సంప్రదించవచ్చా?"
      answer: "అవును, మేము ఫాలో-అప్‌ల కోసం టెలిమెడిసిన్ సందర్శనలను అందిస్తాము. వీడియో అపాయింట్‌మెంట్ షెడ్యూల్ చేయడానికి దయచేసి 99594 23566కు కాల్ చేయండి."
    - question: "ప్రారంభ సందర్శన ఖర్చ ఎంత?"
      answer: "ప్రారంభ సందర్శన ₹500. ఇది వివరణాత్మక మూల్యాంకనం, ECG మరియు చికిత్స ప్రణాళిక చేర్చుకుంటుంది."
    - question: "మీరు ఎమర్జెన్సీ సేవలను అందిస్తారా?"
      answer: "అవును, మేము 24/7 ఎమర్జెన్సీ కార్డియాక్ సంరక్షణ అందిస్తాము. ఛాతీ నొప్పి ఉంటే 99594 23566కు కాల్ చేయండి."
    - question: "యాంజియోప్లాస్టీ సఫల్యత రేటు ఎంత?"
      answer: "డాక్టర్ కమలాకర్ యాంజియోప్లాస్టీ విధానాల కోసం 99%+ సఫల్యత రేటును నిర్వహిస్తారు."
    - question: "నేను రెండవ అభిప్రాయం పొందవచ్చా?"
      answer: "అవును! మేము రెండవ అభిప్రాయ సందర్శనలను స్వాగతిస్తాము. దయచేసి మీ వైద్య నివేదికలను మరియు ఇమేజింగ్ అధ్యయనాలను తీసుకువెళ్లండి."
    - question: "గుంటూరులో ECG టెస్ట్ ఖర్చు ఎంత?"
      answer: "కమలాకర్ హార్ట్ సెంటర్, కొత్తపేట, గుంటూరులో ₹500 సంప్రదింపు ఫీజులో ప్రాథమిక ECG చేర్చబడుతుంది. వివరణాత్మక కార్డియాక్ చెకప్‌లు (ECG, 2D Echo, TMT) ధరలు అభ్యర్థనపై పారదర్శకంగా అందించబడతాయి. నిర్దిష్ట పరీక్ష ధరల కోసం 99594 23566కు సంప్రదించండి."
    - question: "గుంటూరులో యాంజియోగ్రామ్ ఎలా చేస్తారు?"
      answer: "యాంజియోగ్రామ్ అనేది కనీస ఆక్రమణాత్మక పరీక్ష, ఇందులో మణికట్టు లేదా తొడ ద్వారా సన్నటి కాథెటర్‌ను చేర్చి, కాంట్రాస్ట్ డై ఉపయోగించి X-రేలో గుండె ధమనులను చూస్తారు. ఈ విధానం కమలాకర్ హార్ట్ సెంటర్, కొత్తపేట, గుంటూరులో 30-60 నిమిషాల్లో పూర్తవుతుంది. డాక్టర్ కమలాకర్ ఆధునిక క్యాథ్-ల్యాబ్ పరికరాలతో అధిక విజయ రేట్లతో యాంజియోగ్రామ్‌లు చేస్తారు."
    - question: "అధిక కొలెస్ట్రాల్ లక్షణాలు ఏమిటి?"
      answer: "అధిక కొలెస్ట్రాల్‌కు సాధారణంగా కనిపించే లక్షణాలు ఉండవు, అందువల్ల క్రమం తప్పకుండా స్క్రీనింగ్ చాలా ముఖ్యం. చికిత్స చేయకపోతే, ఛాతీ నొప్పి, శ్వాస ఆడకపోవడం, అలసట కలగవచ్చు మరియు గుండెపోటు ప్రమాదం పెరుగుతుంది. గుంటూరులోని కమలాకర్ హార్ట్ సెంటర్‌లో డాక్టర్ కమలాకర్ గుండె జబ్బులను నివారించడానికి కొలెస్ట్రాల్ పరీక్ష మరియు నిర్వహణ అందిస్తారు."
    - question: "గుంటూరులో గుండెపోటు చికిత్స ఎక్కడ పొందాలి?"
      answer: "కొత్తపేట, గుంటూరులోని కమలాకర్ హార్ట్ సెంటర్ గుండెపోటు చికిత్సతో సహా 24/7 ఎమర్జెన్సీ కార్డియాక్ కేర్ అందిస్తుంది. తక్షణ సహాయం కోసం 99594 23566కు కాల్ చేయండి. అనుభవజ్ఞుడైన ఇంటర్వెన్షనల్ కార్డియాలజిస్ట్ డాక్టర్ కమలాకర్ నేతృత్వంలో ఎమర్జెన్సీ యాంజియోప్లాస్టీ కోసం అధునాతన క్యాథ్-ల్యాబ్ ఉంది."

