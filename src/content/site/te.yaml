    readArticle: "పూర్తి వ్యాసం చదవండి"
    keywordsLabel: "కీలకపదాలు:"
  articles:
    - id: "a1-te"
      title: "గుండెపోటు హెచ్చరిక సంకేతాలు"
      summary: "గుండెపోటు ముఖ్య హెచ్చరిక సంకేతాలు తెలుసుకోండి — ఛాతీ నొప్పి, చేతులు/వీపు/మెడలో నొప్పి, ఊపిరి ఆడకపోవడం — అత్యవసర సేవలకు వెంటనే కాల్ చేయడం మీ ప్రాణాలను కాపాడగలదు."
      date: "2024"
      url: "https://www.heart.org/en/health-topics/heart-attack/warning-signs-of-a-heart-attack"
      publisher: "American Heart Association"
    - id: "a2-te"
      title: "గుండె జబ్బు నివారణ వ్యూహాలు"
      summary: "పొగతాగడం మానేయడం, ఒత్తిడి నిర్వహణ, ఆరోగ్యకరమైన ఆహారం, క్రమం తప్పకుండా వ్యాయామం మరియు రక్తపోటు పర్యవేక్షణ ద్వారా గుండె జబ్బు ప్రమాదాన్ని తగ్గించడానికి సమగ్ర గైడ్."
      date: "2025"
      url: "https://www.mayoclinic.org/diseases-conditions/heart-disease/in-depth/heart-disease-prevention/art-20046502"
      publisher: "Mayo Clinic"
    - id: "a3-te"
      title: "హైపర్‌టెన్షన్ (అధిక రక్తపోటు): లక్షణాలు మరియు కారణాలు"
      summary: "అధిక రక్తపోటును 'నిశ్శబ్ద హంతకుడు' అని ఎందుకు పిలుస్తారో, దానిని ఎలా కొలుస్తారో, మరియు జీవనశైలి మార్పులు మరియు మందుల ద్వారా ఎలా నిర్వహించాలో తెలుసుకోండి."
      date: "2025"
      url: "https://my.clevelandclinic.org/health/diseases/4314-hypertension-high-blood-pressure"
      publisher: "Cleveland Clinic"
    - id: "a4-te"
      title: "కొలెస్ట్రాల్ తగ్గించే 11 ఆహారాలు"
      summary: "ఓట్స్, బీన్స్, గింజలు మరియు కూరగాయల నూనెలతో సహా LDL ('చెడు') కొలెస్ట్రాల్ తగ్గించడంలో సహాయపడే నిర్దిష్ట ఆహారాలను కనుగొనండి."
      date: "2024"
      url: "https://www.health.harvard.edu/heart-health/11-foods-that-lower-cholesterol"
      publisher: "Harvard Health"
    - id: "a5-te"
      title: "హార్ట్ ఫెయిల్యూర్"
      summary: "హార్ట్ ఫెయిల్యూర్ అంటే ఏమిటి, దాని ముఖ్య కారణాలు (కరోనరీ హార్ట్ డిసీజ్, అధిక రక్తపోటు), ఊపిరి ఆడకపోవడం వంటి లక్షణాలు, మరియు మందులు & జీవనశైలి మార్పులతో ఎలా చికిత్స చేయాలి."
      date: "2026"
      url: "https://www.nhs.uk/conditions/heart-failure/"
      publisher: "NHS (UK)"
    - id: "a6-te"
      title: "యాంజియోప్లాస్టీ మరియు స్టెంట్ అమర్చడం — గుండె"
      summary: "యాంజియోప్లాస్టీ విధానం దశల వారీగా — కాథెటర్ మరియు బెలూన్ అడ్డుపడిన ధమనులను ఎలా తెరుస్తాయి, స్టెంట్లు ధమనులను తెరిచి ఉంచడం, మరియు ఫాలో-అప్ మందుల ప్రాముఖ్యత."
      date: "2024"
      url: "https://medlineplus.gov/ency/article/007473.htm"
      publisher: "MedlinePlus / NIH"
    - id: "a7-te"
      title: "పేస్‌మేకర్: రకాలు, శస్త్రచికిత్స & ఏమి చేస్తుంది"
      summary: "పేస్‌మేకర్ అంటే ఏమిటి, ఎందుకు అవసరం, లీడ్‌లెస్ పేస్‌మేకర్లతో సహా రకాలు, ఇంప్లాంట్ సమయంలో ఏమి జరుగుతుంది, మరియు పేస్‌మేకర్‌తో దీర్ఘకాలం జీవించడం గురించి పూర్తి గైడ్."
      date: "2026"
      url: "https://my.clevelandclinic.org/health/treatments/17360-permanent-pacemaker"
      publisher: "Cleveland Clinic"
    - id: "a8-te"
      title: "మెడిటరేనియన్ డైట్ యొక్క భారతీయ అనుసరణ"
      summary: "భారతీయ ఆహారాలతో గుండె-రక్షణ మెడిటరేనియన్ డైట్‌ను ఎలా అనుసరించాలో తెలుసుకోండి — పప్పు, చనా మసాలా, తృణధాన్యాలు, కూరగాయలు మరియు పసుపు వంటి సుగంధ ద్రవ్యాలతో."
      date: "2025"
      url: "https://www.health.harvard.edu/heart-health/an-indian-adaptation-of-the-mediterranean-diet"
      publisher: "Harvard Health"
    - id: "a9-te"
      title: "గుండె ఆరోగ్యాన్ని పెంచే 3 రకాల వ్యాయామాలు"
      summary: "గుండె ఆరోగ్యానికి మూడు ముఖ్యమైన వ్యాయామ రకాలు: ఏరోబిక్ వ్యాయామం (నడక, సైక్లింగ్), రెసిస్టెన్స్ ట్రైనింగ్ (బరువులు), మరియు ఫ్లెక్సిబిలిటీ వర్కౌట్లు. రోజూ కనీసం 30 నిమిషాలు సిఫార్సు."
      date: "2025"
      url: "https://www.hopkinsmedicine.org/health/wellness-and-prevention/3-kinds-of-exercise-that-boost-heart-health"
      publisher: "Johns Hopkins Medicine"
    - id: "a10-te"
      title: "గుండెపోటు: ప్రథమ చికిత్స"
      summary: "ఎవరికైనా గుండెపోటు వస్తే ఏమి చేయాలి — అత్యవసర సేవలకు కాల్ చేయండి, ఆస్పిరిన్ నమలమని చెప్పండి, మరియు వారు స్పందించకపోతే CPR ప్రారంభించండి."
      date: "2024"
      url: "https://www.mayoclinic.org/first-aid/first-aid-heart-attack/basics/art-20056679"
      publisher: "Mayo Clinic"

testimonials:
  heading: "మా రోగుల మాటల్లో"
  successStories: "రోగుల విజయ కథలు"
  subtitle: "డాక్టర్ కమలాకర్‌కు తమ గుండెలను అప్పగించిన రోగుల నిజమైన అనుభవాలు."
  verifiedPatient: "ధృవీకరించబడిన రోగి"
  joinedText: "1000+ సంతోషకరమైన గుండెలతో చేరారు"
  items:
    - text: "డాక్టర్ కమలాకర్ గారు చాలా బాగా ట్రీట్మెంట్ ఇచ్చారు. ఇప్పుడు నాకు హార్ట్ పరంగా ఏ ఇబ్బంది లేదు. థాంక్యూ సార్."
      author: "మంగమ్మ"
    - text: "గుంటూరులో ఉత్తమ కార్డియాలజిస్ట్. క్లిష్టమైన కేసులను కూడా విజయవంతంగా చేశారు."
      author: "శరత్"
    - text: "తక్కువ ఖర్చుతో మంచి వైద్యం. డాక్టర్లు మరియు సిబ్బంది చాలా బాగా చూసుకుంటారు."
      author: "సుగ్గుణ సంపూర్ణ"
    - text: "మా నాన్నకు గుండెపోటు వచ్చినప్పుడు డాక్టర్ కమలాకర్ గారు ఒక గంటలోనే ఎమర్జెన్సీ యాంజియోప్లాస్టీ చేశారు. ఆయన ప్రాణాలు కాపాడారు. ఎప్పటికీ కృతజ్ఞులం."
      author: "రవి కుమార్"
    - text: "గుంటూరులో ఉత్తమ హృదయ వైద్యుడు. చికిత్స ఎంపికలు మరియు ఖర్చుల గురించి చాలా పారదర్శకంగా ఉంటారు. అనవసరమైన ప్రక్రియలు ఉండవు."
      author: "లక్ష్మీ దేవి"

