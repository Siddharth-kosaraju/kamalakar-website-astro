    - title: "ఎమర్జెన్సీ కార్డియాక్ కేర్"
      desc: "గుంటూరులో 24/7 గుండెపోటు చికిత్స. మయోకార్డియల్ ఇన్ఫార్క్షన్ కోసం తక్షణ సంరక్షణ."
    - title: "2D ఎకో & గుండె పరీక్షలు"
